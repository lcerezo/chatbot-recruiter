# Rate limit keyed on the real visitor IP from Cloudflare,
# falling back to the direct client IP for non-tunnel (LAN) requests.
map $http_cf_connecting_ip $rl_key {
    ""      $remote_addr;
    default $http_cf_connecting_ip;
}
limit_req_zone $rl_key zone=chat:10m rate=6r/m;
limit_req_status 429;

server {
    listen 0.0.0.0:8888;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Only the two Ollama endpoints the app uses are exposed.
    # No pull/delete/create/generate — the API is not a public playground.
    location = /ollama/api/chat {
        if ($request_method != POST) { return 405; }
        limit_req zone=chat burst=3 nodelay;
        proxy_pass http://127.0.0.1:11434/api/chat;
        proxy_set_header Host localhost;
        proxy_set_header Origin "";
        proxy_set_header Referer "";
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    location = /ollama/api/tags {
        if ($request_method != GET) { return 405; }
        proxy_pass http://127.0.0.1:11434/api/tags;
        proxy_set_header Host localhost;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /ollama/ {
        return 403;
    }
}
